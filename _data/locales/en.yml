# The layout text of site

# ----- Commons label -----

layout:
  post: Post
  category: Category
  tag: Tag

# The tabs of sidebar
tabs:
  # format: <filename_without_extension>: <value>
  home: Home
  categories: Categories
  tags: Tags
  archives: Archives
  about: About

# the text displayed in the search bar & search results
search:
  hint: Search
  cancel: Cancel
  no_results: No results found.

panel:
  lastmod: Recently Updated
  trending_tags: Trending Tags
  toc: On this page

copyright:
  # Shown at the bottom of the post
  license:
    template: This article is licensed under :LICENSE_NAME by the author.
    name: CC BY 4.0
    link: https://creativecommons.org/licenses/by/4.0/

  # Displayed in the footer
  brief: Some rights reserved
  verbose: >-
    Except where otherwise noted, the blog posts on this site are licensed under
    the Creative Commons Attribution 4.0 International (CC BY 4.0) License by the author.

meta: Powered by :PLATFORM with :THEME theme

not_found:
  statement: The requested URL does not exist.

notification:
  update_found: A new version of the content is available.
  update: Update

# ----- Posts related labels -----

post:
  written_by: By
  posted: Posted
  updated: Updated
  words: words
  pageview_measure: views
  read_time:
    unit: min
    prompt: read
  relate_posts: Related Posts
  share: Share
  button:
    next: Newer
    previous: Older
    copy_code:
      succeed: Copied!
    share_link:
      title: Copy link
      succeed: Link copied!

# Date time format.
# See: <http://strftime.net/>, <https://day.js.org/docs/en/display/format>
df:
  post:
    strftime: "%b %d, %Y"
    dayjs: "MMM DD, YYYY"

# categories page
categories:
  category_measure: categories
  post_measure: posts
