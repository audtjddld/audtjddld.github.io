# Site settings
title: "404 dev"
tagline: "개발 블로그"
description: >-
  개발 블로그
url: "https://404.is-a.dev"
baseurl: ""

lang: ko
timezone: Asia/Seoul

github_username: audtjddld

# Theme
theme: jekyll-theme-chirpy

# Avatar (사이드바 프로필 이미지 — 필요시 경로 변경)
# avatar: /assets/img/avatar.png

# Social links (사이드바 하단)
social:
  name: audtjddld
  links:
    - https://github.com/audtjddld

# Build settings
port: 6704
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-include-cache
  - jekyll-archives

paginate: 15
paginate_path: "/page/:num/"

# Permalink
permalink: /posts/:title/

# Collections
collections:
  tabs:
    output: true
    sort_by: order

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# Chirpy 설정
toc: true

# 댓글 (필요시 활성화)
comments:
  provider: false

# Jekyll Archives
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - cleanup_posts.py
  - __pycache__/
